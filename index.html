<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briff Game</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/b-key.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 400px; }

        /* Улучшенная кнопка недели для тестов */
        .week-selector { 
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            padding: 8px 20px;
            border-radius: 12px;
            color: #666;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.2s;
            cursor: pointer;
            -webkit-user-select: none;
        }
        .week-selector:active { background: rgba(0, 212, 255, 0.1); color: #00d4ff; border-color: #00d4ff; }

        .stats-card { background: #1e1e1e; padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid #333; position: relative; width: 100%; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .lvl-badge { position: absolute; top: -10px; right: 15px; background: #FFD700; color: #121212; padding: 4px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .progress-bar { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .my-bar { background: #00d4ff; box-shadow: 0 0 15px rgba(0,212,255,0.4); }
        .p-bar { background: #ff007a; box-shadow: 0 0 15px rgba(255,0,122,0.4); }
        .coin-val { font-weight: 800; font-size: 1.1rem; color: #FFD700; }
        
        /* Маркет */
        #date-market { display: none; background: #1e1e1e; padding: 25px; border-radius: 30px; border: 2px solid #00d4ff; position: fixed; top: 10%; left: 5%; width: 90%; max-width: 360px; z-index: 100; box-sizing: border-box; box-shadow: 0 0 60px rgba(0,0,0,1); }
        .date-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #2a2a2a; }
        .buy-btn { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; }
        .buy-btn:disabled { background: #333; color: #555; }

        .task-card { background: #1e1e1e; padding: 18px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid #2a2a2a; width: 100%; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; }
        .add-btn { background: #00d4ff; width: 55px; height: 55px; border-radius: 16px; font-size: 2rem; border: none; color: #121212; font-weight: bold; }
        .sub-btn { background: #2a2a2a; color: #555; width: 55px; height: 55px; border-radius: 16px; border: none; font-size: 2rem; }
        
        #loading-screen { margin-top: 100px; text-align: center; color: #FFD700; font-weight: bold; }
        .btn-reset { background: none; border: 1px dashed #444; color: #444; width: 100%; padding: 12px; border-radius: 12px; margin-top: 30px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div id="loading-screen">🪙 Загрузка Briff Game...</div>

<div class="container" id="game-screen" style="display:none;">
    <div style="text-align: center; margin-bottom: 25px;">
        <h2 id="greet" style="margin:0; font-size: 1.6rem;">Briff</h2>
        <div id="week-tag" class="week-selector" onclick="app.openMarket()">НЕДЕЛЯ 1 / 4</div>
    </div>

    <div class="stats-card">
        <div id="lvl-badge" class="lvl-badge">НОВИЧКИ</div>
        <div style="display:flex; justify-content:space-between; align-items: center;">
            <span id="l-my" style="font-size: 0.9rem; color: #888;">Я</span>
            <span id="v-my" class="coin-val">0 🪙</span>
        </div>
        <div class="progress-bar"><div id="f-my" class="progress-fill my-bar"></div></div>
        
        <div style="display:flex; justify-content:space-between; align-items: center; margin-top:22px;">
            <span id="l-p" style="font-size: 0.9rem; color: #888;">Партнер</span>
            <span id="v-p" class="coin-val" style="color: #ff007a;">0 🪙</span>
        </div>
        <div class="progress-bar"><div id="f-p" class="progress-fill p-bar"></div></div>
    </div>

    <div id="date-market">
        <h3 style="margin-top:0; color:#00d4ff; text-align:center;">Магазин свиданий</h3>
        <div id="date-options" style="max-height: 350px; overflow-y: auto;"></div>
        <button class="btn" style="background:#333; color:white; width:100%; margin-top:15px; border:none; padding:15px; border-radius:15px; font-weight:bold;" onclick="document.getElementById('date-market').style.display='none'">Закрыть</button>
    </div>

    <div id="tasks"></div>

    <div id="admin-panel" style="display:none;">
        <button class="btn-reset" onclick="app.manualReset()">СЛЕДУЮЩАЯ НЕДЕЛЯ (СБРОС 🪙)</button>
    </div>
</div>

<script>
