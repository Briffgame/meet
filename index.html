<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briff Game</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/b-key.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 400px; }

        /* Кнопка недели с защитой от "непрокликивания" */
        .week-selector { 
            display: inline-block;
            background: #1e1e1e;
            border: 1px solid #00d4ff; /* Сделал ярче, чтобы видеть зону */
            padding: 12px 25px;
            border-radius: 15px;
            color: #00d4ff;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 15px;
            position: relative;
            z-index: 999;
            cursor: pointer;
            touch-action: manipulation;
        }

        .stats-card { background: #1e1e1e; padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid #333; position: relative; width: 100%; box-sizing: border-box; }
        .lvl-badge { position: absolute; top: -10px; right: 15px; background: #FFD700; color: #121212; padding: 4px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .progress-bar { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .my-bar { background: #00d4ff; }
        .p-bar { background: #ff007a; }
        .coin-val { font-weight: 800; font-size: 1.1rem; color: #FFD700; }
        
        #date-market { display: none; background: #1e1e1e; padding: 25px; border-radius: 30px; border: 2px solid #00d4ff; position: fixed; top: 10%; left: 5%; width: 90%; max-width: 360px; z-index: 1000; box-sizing: border-box; box-shadow: 0 0 100px rgba(0,0,0,1); }
        .date-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #2a2a2a; }
        .buy-btn { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; }

        .task-card { background: #1e1e1e; padding: 18px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid #2a2a2a; width: 100%; box-sizing: border-box; }
        .add-btn { background: #00d4ff; width: 55px; height: 55px; border-radius: 16px; font-size: 2rem; border: none; color: #121212; font-weight: bold; }
        .sub-btn { background: #2a2a2a; color: #555; width: 55px; height: 55px; border-radius: 16px; border: none; font-size: 2rem; }
    </style>
</head>
<body>

<div id="loading-screen" style="margin-top:100px;">🪙 Загрузка...</div>

<div class="container" id="game-screen" style="display:none;">
    <div style="text-align: center; margin-bottom: 25px;">
        <h2 id="greet" style="margin:0;">Briff</h2>
        <div id="week-tag" class="week-selector" onclick="app.openMarket()" ontouchend="app.openMarket()">
            НЕДЕЛЯ 1 / 4 (ТЕСТ МАРКЕТА)
        </div>
    </div>

    <div class="stats-card">
        <div id="lvl-badge" class="lvl-badge">НОВИЧКИ</div>
        <div style="display:flex; justify-content:space-between; align-items: center;">
            <span id="l-my">Я</span>
            <span id="v-my" class="coin-val">0 🪙</span>
        </div>
        <div class="progress-bar"><div id="f-my" class="progress-fill my-bar"></div></div>
        
        <div style="display:flex; justify-content:space-between; align-items: center; margin-top:22px;">
            <span id="l-p">Партнер</span>
            <span id="v-p" class="coin-val" style="color: #ff007a;">0 🪙</span>
        </div>
        <div class="progress-bar"><div id="f-p" class="progress-fill p-bar"></div></div>
    </div>

    <div id="date-market">
        <h3 style="margin-top:0; color:#00d4ff; text-align:center;">Магазин свиданий</h3>
        <div id="date-options" style="max-height: 350px; overflow-y: auto;"></div>
        <button class="btn" style="background:#333; color:white; width:100%; margin-top:15px; border:none; padding:15px; border-radius:15px; font-weight:bold;" onclick="document.getElementById('date-market').style.display='none'">Закрыть</button>
    </div>

    <div id="tasks" style="margin-top:20px;"></div>

    <div id="admin-panel" style="display:none;">
        <button onclick="app.manualReset()" style="background:none; border:1px dashed #444; color:#444; width:100%; padding:10px; margin-top:30px; border-radius:10px;">СЛЕДУЮЩАЯ НЕДЕЛЯ</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bndqlyigisgbwqaujtys.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_LDcqX8mk4Mn6gFihWPZ6eg_DzW9xWlN';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = {
        user: null, profile: null, team: [],
        tasks: [{id:'pos', n:'Посуда', x:30},{id:'st', n:'Стирка', x:40},{id:'ub', n:'Уборка', x:100},{id:'sh', n:'Сушилка', x:20},{id:'zf', n:'Завтрак', x:60}],
        allDates: [
            {n:"Карш и мак", p:150}, {n:"Роллы и Кино", p:200}, {n:"Настолки с вином", p:250},
            {n:"Поход в кино", p:300}, {n:"Поход в бар", p:350}, {n:"Квиз", p:400},
            {n:"Музей/Выставка", p:450}, {n:"Катание на лодочках", p:500}, {n:"Пикник", p:550},
            {n:"Гастро тур", p:600}, {n:"Поход в Театр", p:700}, {n:"Мастер класс", p:800}
        ].sort((a,b) => a.p - b.p),

        async init() {
            const n = localStorage.getItem('briff_nick'), p = localStorage.getItem('briff_pass');
            if (n && p) {
                const { data } = await sb.auth.signInWithPassword({ email: `${n.toLowerCase()}@gmail.com`, password: p });
                if (data.user) { this.user = data.user; await this.start(); return; }
            }
            alert("Нужен логин!");
        },

        async start() {
            const { data: pr } = await sb.from('profiles').select('*').eq('id', this.user.id).single();
            this.profile = pr;
            if (pr.nickname.toLowerCase() === 'briff') document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            this.renderTasks(); this.refresh();
            sb.channel('db').on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles'},()=>this.refresh()).subscribe();
        },

        renderTasks() {
            document.getElementById('tasks').innerHTML = this.tasks.map(t => `
                <div class="task-card">
                    <div><b>${t.n}</b><br><small style="color:#FFD700">+${t.x} 🪙</small></div>
                    <div class="controls">
                        <button class="sub-btn" onclick="app.doTask(${t.x*-1})">−</button>
                        <button class="add-btn" onclick="app.doTask(${t.x})">+</button>
                    </div>
                </div>`).join('');
        },

        async doTask(x) {
            const { data: current } = await sb.from('profiles').select('xp').eq('id', this.user.id).single();
            await sb.from('profiles').update({ xp: Math.max(0, (current.xp || 0) + x) }).eq('id', this.user.id);
            this.refresh();
        },

        async refresh() {
            const { data: team } = await sb.from('profiles').select('*').eq('pair_code', this.profile.pair_code);
            this.team = team;
            const me = team.find(x => x.id === this.user.id), p = team.find(x => x.id !== this.user.id);
            const week = me.current_week || 1;
            document.getElementById('week-tag').innerText = `НЕДЕЛЯ ${week} / 4 (ТЕСТ МАРКЕТА)`;
            
            const setBar = (fill, val, lab, name, xp) => {
                document.getElementById(fill).style.width = Math.min((xp / 800) * 100, 100) + '%';
                document.getElementById(val).innerText = `${xp} 🪙`;
                document.getElementById(lab).innerText = name;
            };
            setBar('f-my', 'v-my', 'l-my', `Я (${me.nickname})`, me.xp);
            if(p) setBar('f-p', 'v-p', 'l-p', p.nickname, p.xp);
        },

        openMarket() {
            const me = this.team.find(x => x.id === this.user.id);
            const allUsed = this.team.map(u => u.used_dates || "").join(',').split(',').filter(x => x);
            const available = this.allDates.filter(d => !allUsed.includes(d.n));
            
            document.getElementById('date-market').style.display = 'block';
            document.getElementById('date-options').innerHTML = available.map(d => `
                <div class="date-item">
                    <span>${d.n} (<b>${d.p} 🪙</b>)</span>
                    <button class="buy-btn" ${me.xp < d.p ? 'disabled' : ''} onclick="app.buyDate('${d.n}', ${d.p})">Купить</button>
                </div>`).join('');
        },

        async buyDate(name, price) {
            if (!confirm(`Купить "${name}" за ${price}?`)) return;
            const me = this.team.find(x => x.id === this.user.id);
            const newUsed = me.used_dates ? me.used_dates + "," + name : name;
            await sb.from('profiles').update({ xp: me.xp - price, used_dates: newUsed }).eq('id', this.user.id);
            document.getElementById('date-market').style.display = 'none';
            this.refresh();
        },

        async manualReset() {
            if (!confirm("Сбросить?")) return;
            const nextW = (this.profile.current_week || 1) + 1;
            await sb.from('profiles').update({ xp: 0, current_week: nextW }).eq('pair_code', this.profile.pair_code);
            location.reload();
        }
    };
    app.init();
</script>
</body>
</html>
