<script>
    // ... (стили и верстка остаются прежними)

    async refresh() {
        // Принудительно проверяем, не сменился ли сеанс
        await sb.auth.getSession();

        const { data: team, error: teamError } = await sb.from('profiles').select('*').eq('pair_code', this.profile.pair_code);
        if(!team || teamError) return;
        
        const me = team.find(x => x.id === this.user.id);
        const p = team.find(x => x.id !== this.user.id);
        
        // МАГИЯ АВТО-СИНХРОНИЗАЦИИ
        // Если партнер (ты) сбросил всё, а у меня (Оли) еще старые данные
        if (p && p.current_week === 1 && p.xp === 0 && (this.profile.current_week !== 1 || this.profile.xp !== 0)) {
            console.log("Синхронизация сброса сезона...");
            
            // Оля обновляет свои данные
            const { error: resetErr } = await sb.from('profiles')
                .update({ xp: 0, current_week: 1, used_dates: "" })
                .eq('id', this.user.id);

            if (!resetErr) {
                // Чистим локальный кэш и перезагружаем
                this.profile.current_week = 1;
                this.profile.xp = 0;
                location.reload(); 
                return;
            }
        }

        this.profile = me;
        this.team = team;

        // Обновляем экран
        document.getElementById('v-my').innerHTML = `${me.xp} ${coinHTML()}`;
        document.getElementById('f-my').style.width = Math.min((me.xp/800)*100, 100) + '%';
        
        if(p) {
            document.getElementById('label-p').innerText = p.nickname;
            document.getElementById('v-p').innerHTML = `${p.xp} ${coinHTML()}`;
            document.getElementById('f-p').style.width = Math.min((p.xp/800)*100, 100) + '%';
        }

        const week = me.current_week || 1;
        const lvls = ["НОВИЧКИ", "ЛЮБИТЕЛИ", "ПРОФИ", "ЛЕГЕНДЫ"];
        document.getElementById('week-tag').innerText = `НЕДЕЛЯ ${week} / 4`;
        document.getElementById('lvl-badge').innerText = lvls[week-1] || "ЛЕГЕНДЫ";
        
        this.updateShopButton(me, team);
    },

    async manualReset() {
        if (!confirm("Обнулить сезон для обоих?")) return;
        
        // 1. Сначала сбрасываем тебя
        const { error } = await sb.from('profiles')
            .update({ xp: 0, current_week: 1, used_dates: "" })
            .eq('id', this.user.id);
        
        if (error) {
            alert("Ошибка: " + error.message);
        } else {
            alert("Твой профиль обнулен. Оля синхронизируется автоматически при открытии приложения!");
            location.reload();
        }
    }
    // ... (остальные функции остаются)
</script>
