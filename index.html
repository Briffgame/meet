<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briff Game: Season 1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .stats-card { background: #1e1e1e; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .lvl-badge { position: absolute; top: -10px; right: 10px; background: #00d4ff; color: #121212; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .progress-bar { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; width: 0%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .my-bar { background: #00d4ff; box-shadow: 0 0 10px rgba(0,212,255,0.3); }
        .p-bar { background: #ff007a; box-shadow: 0 0 10px rgba(255,0,122,0.3); }
        .task-card { background: #1e1e1e; padding: 15px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid #2a2a2a; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .primary { background: #00d4ff; color: #121212; width: 100%; font-size: 1rem; }
        .controls { display: flex; gap: 8px; }
        .add-btn { background: #00d4ff; width: 45px; height: 45px; border-radius: 12px; font-size: 1.5rem; border: none; color: #121212; }
        .sub-btn { background: #333; color: #666; width: 45px; height: 45px; border-radius: 12px; border: none; font-size: 1.5rem; }
        
        #date-market { display: none; background: #1e1e1e; padding: 20px; border-radius: 25px; border: 2px solid #00d4ff; position: fixed; top: 10%; left: 5%; width: 90%; max-width: 360px; z-index: 100; box-sizing: border-box; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .date-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .buy-btn { background: #2ecc71; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; }
        .buy-btn:disabled { background: #333; color: #555; cursor: not-allowed; }
        #loading-screen { margin-top: 50px; color: #00d4ff; font-weight: bold; }
        .price-tag { color: #00d4ff; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

<div id="loading-screen">Загрузка кошельков...</div>

<div class="container" id="game-screen" style="display:none;">
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 id="greet" style="margin:0;">Привет!</h2>
        <div id="week-info" style="color: #666; font-size: 0.8rem; margin-top: 5px;">НЕДЕЛЯ 1 / 4</div>
    </div>

    <div class="stats-card">
        <div id="lvl-name" class="lvl-badge">НОВИЧКИ</div>
        <div style="display:flex; justify-content:space-between; font-size: 0.9rem;">
            <span id="l-my">Я</span>
            <span id="v-my" style="font-weight: bold;">0 🪙</span>
        </div>
        <div class="progress-bar"><div id="f-my" class="progress-fill my-bar"></div></div>
        
        <div style="display:flex; justify-content:space-between; margin-top:15px; font-size: 0.9rem;">
            <span id="l-p">Партнер</span>
            <span id="v-p" style="font-weight: bold;">0 🪙</span>
        </div>
        <div class="progress-bar"><div id="f-p" class="progress-fill p-bar"></div></div>
    </div>

    <button id="shop-btn" class="btn primary" style="display:none; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,212,255,0.3);" onclick="app.openMarket()">ВЫБРАТЬ СВИДАНИЕ 🥂</button>

    <div id="date-market">
        <h3 style="margin-top:0; color:#00d4ff; text-align: center;">Магазин свиданий</h3>
        <div id="date-options" style="max-height: 350px; overflow-y: auto; padding-right: 5px;"></div>
        <button class="btn" style="background:#333; color:white; width:100%; margin-top:15px;" onclick="document.getElementById('date-market').style.display='none'">Закрыть</button>
    </div>

    <div id="tasks"></div>
    
    <div id="admin-panel" style="display:none; margin-top:30px;">
        <button class="btn" style="background:none; border: 1px dashed #444; color:#444; width:100%; font-size: 0.7rem;" onclick="app.manualReset()">СЛЕДУЮЩАЯ НЕДЕЛЯ (СБРОС КОЙНОВ)</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bndqlyigisgbwqaujtys.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_LDcqX8mk4Mn6gFihWPZ6eg_DzW9xWlN';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = {
        levels: ["НОВИЧКИ", "ЛЮБИТЕЛИ", "ПРОФИ", "ЛЕГЕНДЫ"],
        tasks: [
            {id:'pos', n:'Посуда', x:30},
            {id:'st', n:'Стирка', x:40},
            {id:'ub', n:'Уборка', x:100},
            {id:'sh', n:'Сушилка', x:20},
            {id:'zf', n:'Завтрак', x:60}
        ],
        allDates: [
            {n:"Карш и мак", p:150}, {n:"Роллы и Кино", p:200}, {n:"Настолки с вином", p:250},
            {n:"Поход в кино", p:300}, {n:"Поход в бар", p:350}, {n:"Квиз", p:400},
            {n:"Музей/Выставка", p:450}, {n:"Катание на лодочках", p:500}, {n:"Пикник", p:550},
            {n:"Гастро тур", p:600}, {n:"Поход в Театр", p:700}, {n:"Мастер класс", p:800}
        ].sort((a,b) => a.p - b.p), // Сортировка от дешевых к дорогим

        async init() {
            const n = localStorage.getItem('briff_nick'), p = localStorage.getItem('briff_pass');
            if (!n) return alert("Войдите заново!");
            const { data } = await sb.auth.signInWithPassword({ email: `${n.toLowerCase()}@gmail.com`, password: p });
            this.user = data.user;
            await this.start();
        },

        async start() {
            const { data: pr } = await sb.from('profiles').select('*').eq('id', this.user.id).single();
            this.profile = pr;
            if (pr.nickname.toLowerCase() === 'briff') document.getElementById('admin-panel').style.display = 'block';
            
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('greet').innerText = `Кошелёк: ${pr.nickname}`;
            
            this.renderTasks();
            this.refresh();
            sb.channel('db').on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles'},()=>this.refresh()).subscribe();
        },

        renderTasks() {
            document.getElementById('tasks').innerHTML = this.tasks.map(t => `
                <div class="task-card">
                    <div><b>${t.n}</b><br><small style="color:#888">+${t.x} 🪙</small></div>
                    <div class="controls">
                        <button class="sub-btn" onclick="app.doTask(${t.x*-1})">−</button>
                        <button class="add-btn" onclick="app.doTask(${t.x})">+</button>
                    </div>
                </div>`).join('');
        },

        async doTask(x) {
            const { data } = await sb.from('profiles').select('xp').eq('id', this.user.id).single();
            await sb.from('profiles').update({ xp: Math.max(0, data.xp + x) }).eq('id', this.user.id);
        },

        async refresh() {
            const { data: team } = await sb.from('profiles').select('*').eq('pair_code', this.profile.pair_code);
            if(!team) return;
            const me = team.find(x => x.id === this.user.id), p = team.find(x => x.id !== this.user.id);
            this.team = team;

            const week = me.current_week || 1;
            document.getElementById('week-info').innerText = `НЕДЕЛЯ ${week} / 4`;
            document.getElementById('lvl-name').innerText = this.levels[week-1] || "ЛЕГЕНДЫ";

            document.getElementById('f-my').style.width = Math.min((me.xp / 800) * 100, 100) + '%';
            document.getElementById('v-my').innerText = `${me.xp} 🪙`;
            
            if(p) {
                document.getElementById('f-p').style.width = Math.min((p.xp / 800) * 100, 100) + '%';
                document.getElementById('v-p').innerText = `${p.xp} 🪙`;
                document.getElementById('l-p').innerText = p.nickname;
            }

            // Логика кнопки выбора свидания (Пятница 18:00+)
            const now = new Date(), day = now.getDay(), hours = now.getHours();
            const isFridayNight = (day === 5 && hours >= 18) || day === 6 || day === 0;
            const leader = team.reduce((prev, curr) => (prev.xp > curr.xp) ? prev : curr);

            if (isFridayNight && me.id === leader.id && me.xp >= 150) {
                document.getElementById('shop-btn').style.display = 'block';
            } else {
                document.getElementById('shop-btn').style.display = 'none';
            }
        },

        openMarket() {
            const me = this.team.find(x => x.id === this.user.id);
            // Собираем все использованные свидания от ОБОИХ партнеров
            const allUsed = this.team.map(u => u.used_dates || "").join(',').split(',').filter(x => x);
            const available = this.allDates.filter(d => !allUsed.includes(d.n));

            document.getElementById('date-market').style.display = 'block';
            document.getElementById('date-options').innerHTML = available.length > 0 ? 
                available.map(d => `
                <div class="date-item">
                    <span>${d.n} <span class="price-tag">${d.p} 🪙</span></span>
                    <button class="buy-btn" ${me.xp < d.p ? 'disabled' : ''} onclick="app.buyDate('${d.n}', ${d.p})">Купить</button>
                </div>`).join('') : '<div style="text-align:center; padding:20px; color:#888;">Все свидания выкуплены!</div>';
        },

        async buyDate(name, price) {
            if (!confirm(`Купить "${name}" за ${price} 🪙? Это свидание будет отмечено как выполненное.`)) return;
            
            const me = this.team.find(x => x.id === this.user.id);
            const newUsed = me.used_dates ? me.used_dates + "," + name : name;
            
            await sb.from('profiles').update({ 
                xp: me.xp - price, 
                used_dates: newUsed 
            }).eq('id', this.user.id);
            
            alert(`УРА! Выбрано свидание: ${name}. Собирайтесь!`);
            document.getElementById('date-market').style.display = 'none';
            this.refresh();
        },

        async manualReset() {
            if (!confirm("Внимание! Это обнулит койны и переведет игру на следующую неделю. Делаем?")) return;
            const nextWeek = (this.profile.current_week || 1) + 1;
            await sb.from('profiles').update({ xp: 0, current_week: nextWeek }).eq('pair_code', this.profile.pair_code);
            location.reload();
        }
    };
    app.init();
</script>
</body>
</html>
