<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <style>
        /* Общие настройки фона */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* Контейнер формы */
        .login-card {
            background: #fff;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%; /* Занимает 90% ширины на мобильных */
            max-width: 380px; /* Но не больше 380px на десктопе */
            box-sizing: border-box;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 1.5rem;
            color: #333;
            font-weight: 600;
        }

        /* Стили полей ввода */
        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            font-size: 16px; /* Важно: минимум 16px, чтобы iOS не зумил экран */
            transition: border-color 0.3s ease;
            box-sizing: border-box; /* Чтобы padding не раздувал ширину */
        }

        .input-group input:focus {
            border-color: #764ba2;
        }

        /* Кнопка */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 0.5rem;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* Ссылка на восстановление */
        .footer-link {
            margin-top: 1rem;
            display: block;
            font-size: 14px;
            color: #888;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Привет!</h2>
    <form>
        <div class="input-group">
            <input type="text" placeholder="Логин" required>
        </div>
        <div class="input-group">
            <input type="password" placeholder="Пароль" required>
        </div>
        <button type="submit" class="login-btn">Войти</button>
    </form>
    <a href="#" class="footer-link">Забыли пароль?</a>
</div>

</body>
</html>
