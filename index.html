<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briff Game</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/b-key.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 400px; }
        
        .stats-card { background: #1e1e1e; padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid #333; position: relative; width: 100%; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .lvl-badge { position: absolute; top: -10px; right: 15px; background: #FFD700; color: #121212; padding: 4px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        
        .progress-bar { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .my-bar { background: #00d4ff; box-shadow: 0 0 15px rgba(0,212,255,0.4); }
        .p-bar { background: #ff007a; box-shadow: 0 0 15px rgba(255,0,122,0.4); }
        
        .coin-val { font-weight: 800; font-size: 1.1rem; color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.4); }
        
        .task-card { background: #1e1e1e; padding: 18px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid #2a2a2a; width: 100%; box-sizing: border-box; }
        .task-info b { font-size: 1.1rem; display: block; margin-bottom: 2px; }
        .task-info small { color: #FFD700; font-weight: bold; font-size: 0.9rem; }
        
        .controls { display: flex; gap: 10px; }
        .add-btn { background: #00d4ff; width: 55px; height: 55px; border-radius: 16px; font-size: 2rem; border: none; color: #121212; font-weight: bold; active { transform: scale(0.95); } }
        .sub-btn { background: #2a2a2a; color: #555; width: 55px; height: 55px; border-radius: 16px; border: none; font-size: 2rem; }
        
        #loading-screen { margin-top: 100px; text-align: center; color: #FFD700; font-weight: bold; font-size: 1.2rem; }
        .btn-reset { background: none; border: 1px dashed #444; color: #444; width: 100%; padding: 12px; border-radius: 12px; margin-top: 30px; font-size: 0.8rem; }
        input { width: 100%; padding: 16px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; border-radius: 15px; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

<div id="loading-screen">🪙 Подсчёт золота...</div>

<div class="container" id="auth-screen" style="display:none;">
    <h1 style="color: #FFD700; text-align: center; margin-bottom: 30px; text-shadow: 0 0 20px rgba(255,215,0,0.2);">Briff Game</h1>
    <div style="background: #1e1e1e; padding: 25px; border-radius: 25px; border: 1px solid #333;">
        <input type="text" id="nick" placeholder="Твой Ник">
        <input type="password" id="pair-pass" placeholder="Пароль пары">
        <button onclick="app.handleLogin()" style="width:100%; padding:16px; background:#FFD700; border:none; border-radius:15px; font-weight:bold; font-size:1rem; color:#121212;">Войти в игру</button>
    </div>
</div>

<div class="container" id="game-screen" style="display:none;">
    <div style="text-align: center; margin-bottom: 25px;">
        <h2 id="greet" style="margin:0; font-size: 1.6rem; letter-spacing: -0.5px;">Briff</h2>
        <div id="week-tag" style="color: #666; font-size: 0.8rem; margin-top: 5px; font-weight: bold;">НЕДЕЛЯ 1 / 4</div>
    </div>

    <div class="stats-card">
        <div id="lvl-badge" class="lvl-badge">НОВИЧКИ</div>
        <div style="display:flex; justify-content:space-between; align-items: center;">
            <span id="l-my" style="font-size: 0.9rem; color: #888;">Я</span>
            <span id="v-my" class="coin-val">0 🪙</span>
        </div>
        <div class="progress-bar"><div id="f-my" class="progress-fill my-bar"></div></div>
        
        <div style="display:flex; justify-content:space-between; align-items: center; margin-top:22px;">
            <span id="l-p" style="font-size: 0.9rem; color: #888;">Партнер</span>
            <span id="v-p" class="coin-val" style="color: #ff007a; text-shadow: 0 0 8px rgba(255,0,122,0.3);">0 🪙</span>
        </div>
        <div class="progress-bar"><div id="f-p" class="progress-fill p-bar"></div></div>
    </div>

    <div id="tasks"></div>

    <div id="admin-panel" style="display:none;">
        <button class="btn-reset" onclick="app.manualReset()">СЛЕДУЮЩАЯ НЕДЕЛЯ (СБРОС 🪙)</button>
    </div>
    
    <button onclick="app.logout()" style="background:none; border:none; color:#333; width:100%; margin-top:40px; font-size: 0.7rem;">Выйти</button>
</div>

<script>
    const SUPABASE_URL = 'https://bndqlyigisgbwqaujtys.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_LDcqX8mk4Mn6gFihWPZ6eg_DzW9xWlN';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = {
        user: null, profile: null,
        tasks: [{id:'pos', n:'Посуда', x:30},{id:'st', n:'Стирка', x:40},{id:'ub', n:'Уборка', x:100},{id:'sh', n:'Сушилка', x:20},{id:'zf', n:'Завтрак', x:60}],
        lvls: ["НОВИЧКИ", "ЛЮБИТЕЛИ", "ПРОФИ", "ЛЕГЕНДЫ"],

        async init() {
            const n = localStorage.getItem('briff_nick'), p = localStorage.getItem('briff_pass');
            if (n && p) {
                const { data, error } = await sb.auth.signInWithPassword({ email: `${n.toLowerCase()}@gmail.com`, password: p });
                if (!error) { this.user = data.user; await this.start(); return; }
            }
            this.showAuth();
        },

        showAuth() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'block';
        },

        async handleLogin() {
            const n = document.getElementById('nick').value.trim(), p = document.getElementById('pair-pass').value;
            const { data, error } = await sb.auth.signInWithPassword({ email: `${n.toLowerCase()}@gmail.com`, password: p });
            if (error) return alert("Ошибка: " + error.message);
            localStorage.setItem('briff_nick', n); localStorage.setItem('briff_pass', p);
            location.reload();
        },

        async start() {
            const { data: pr } = await sb.from('profiles').select('*').eq('id', this.user.id).single();
            this.profile = pr;
            if (pr.nickname.toLowerCase() === 'briff') document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('greet').innerText = `Кошелёк: ${pr.nickname}`;
            this.renderTasks(); this.refresh();
            sb.channel('db').on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles'},()=>this.refresh()).subscribe();
        },

        renderTasks() {
            document.getElementById('tasks').innerHTML = this.tasks.map(t => `
                <div class="task-card">
                    <div class="task-info"><b>${t.n}</b><small>+${t.x} 🪙</small></div>
                    <div class="controls">
                        <button class="sub-btn" onclick="app.doTask(${t.x*-1})">−</button>
                        <button class="add-btn" onclick="app.doTask(${t.x})">+</button>
                    </div>
                </div>`).join('');
        },

        async doTask(x) {
            const { data: current } = await sb.from('profiles').select('xp').eq('id', this.user.id).single();
            const newXP = Math.max(0, (current.xp || 0) + x);
            await sb.from('profiles').update({ xp: newXP }).eq('id', this.user.id);
            this.refresh();
        },

        async refresh() {
            const { data: team } = await sb.from('profiles').select('*').eq('pair_code', this.profile.pair_code);
            const me = team.find(x => x.id === this.user.id), p = team.find(x => x.id !== this.user.id);
            const week = me.current_week || 1;
            document.getElementById('week-tag').innerText = `НЕДЕЛЯ ${week} / 4`;
            document.getElementById('lvl-badge').innerText = this.lvls[week-1] || "ЛЕГЕНДЫ";
            const setBar = (fill, val, lab, name, xp) => {
                document.getElementById(fill).style.width = Math.min((xp / 800) * 100, 100) + '%';
                document.getElementById(val).innerText = `${xp} 🪙`;
                document.getElementById(lab).innerText = name;
            };
            setBar('f-my', 'v-my', 'l-my', `Я (${me.nickname})`, me.xp);
            if(p) setBar('f-p', 'v-p', 'l-p', p.nickname, p.xp);
        },

        async manualReset() {
            if (!confirm("Обнулить золото и перейти на следующую неделю?")) return;
            const nextW = (this.profile.current_week || 1) + 1;
            await sb.from('profiles').update({ xp: 0, current_week: nextW }).eq('pair_code', this.profile.pair_code);
            location.reload();
        },

        logout() { localStorage.clear(); location.reload(); }
    };
    app.init();
</script>
</body>
</html>
