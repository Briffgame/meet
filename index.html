<script>
    const SUPABASE_URL = 'https://bndqlyigisgbwqaujtys.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_LDcqX8mk4Mn6gFihWPZ6eg_DzW9xWlN';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = {
        user_id: null, profile: null, authMode: 'login',
        tasks: [{n:'Посуда', x:30}, {n:'Стирка', x:40}, {n:'Уборка', x:100}, {n:'Завтрак', x:60}, {n:'Мусор', x:40}],
        allDates: [{n:"🍦 Прогулка", p:150}, {n:"🍿 Кино", p:300}, {n:"🧩 Сборка пазла", p:200}, {n:"🧘 Совместная йога", p:250}, {n:"🍝 Ресторан", p:600}, {n:"🍷 Вино и Домино", p:400}, {n:"🎮 Турнир в приставку", p:350}, {n:"🎨 Рисование вином", p:500}, {n:"🎤 Караоке", p:450}, {n:"🛀 СПА дома", p:700}, {n:"🎭 Театр или Стендап", p:900}, {n:"⛸️ Каток или Ролики", p:400}, {n:"🍕 Мастер-класс", p:750}, {n:"📸 Фотосессия", p:1000}, {n:"🚗 Мини-трип", p:2000}, {n:"⛺ Пикник", p:800}, {n:"🏰 Музей/Выставка", p:550}, {n:"🍳 Завтрак в постель", p:1200}, {n:"🎱 Бильярд", p:400}, {n:"🤫 Секретное свидание", p:2500}],

        async init() {
            const savedId = localStorage.getItem('briff_user_id');
            if (!savedId) return this.askLogin();
            
            this.user_id = savedId;
            await this.start();
        },

        askLogin() {
            this.authMode = 'login';
            document.getElementById('loading-screen').innerHTML = `
                <div style="width: 100%; max-width: 300px; text-align: center; margin: 0 auto;">
                    <h2 id="auth-title" style="margin-bottom: 20px; color: #FFD700;">ВХОД В ПРИЛОЖЕНИЕ</h2>
                    
                    <input type="email" id="e_in" placeholder="Ваш Email" 
                        style="width:100%; padding:18px; margin-bottom:12px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:18px; box-sizing:border-box; outline:none;">
                    
                    <input type="password" id="p_in" placeholder="Пароль" 
                        style="width:100%; padding:18px; margin-bottom:12px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:18px; box-sizing:border-box; outline:none;">

                    <input type="text" id="n_in" placeholder="Ваше Имя / Никнейм" 
                        style="width:100%; padding:18px; margin-bottom:12px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:18px; box-sizing:border-box; outline:none; display:none;">
                    
                    <input type="text" id="code_in" placeholder="6-значный код партнера (если есть)" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                        style="width:100%; padding:18px; margin-bottom:20px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:18px; box-sizing:border-box; outline:none; display:none;">
                    
                    <button id="auth-btn" onclick="app.handleAuth()" 
                        style="width:100%; padding:18px; background:linear-gradient(135deg, #00d4ff, #008fb3); border:none; color:#121212; font-weight:bold; border-radius:18px; font-size:1rem; cursor:pointer; margin-bottom: 15px;">
                        ВОЙТИ
                    </button>

                    <div id="auth-toggle" style="color: #666; cursor: pointer; font-size: 0.9rem; text-decoration: underline;" onclick="app.toggleAuthMode()">
                        У вас нет аккаунта? Зарегистрироваться
                    </div>
                </div>
            `;
        },

        toggleAuthMode() {
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-btn');
            const toggle = document.getElementById('auth-toggle');
            const nicknameInput = document.getElementById('n_in');
            const codeInput = document.getElementById('code_in');

            if (this.authMode === 'login') {
                this.authMode = 'register';
                title.innerText = 'РЕГИСТРАЦИЯ ПАРЫ';
                btn.innerText = 'СОЗДАТЬ АККАУНТ';
                toggle.innerText = 'Уже есть аккаунт? Войти по Email';
                nicknameInput.style.display = 'block';
                codeInput.style.display = 'block';
            } else {
                this.authMode = 'login';
                title.innerText = 'ВХОД В ПРИЛОЖЕНИЕ';
                btn.innerText = 'ВОЙТИ';
                toggle.innerText = 'У вас нет аккаунта? Зарегистрироваться';
                nicknameInput.style.display = 'none';
                codeInput.style.display = 'none';
            }
        },

        async handleAuth() {
            const email = document.getElementById('e_in').value.trim();
            const password = document.getElementById('p_in').value;
            const nickname = document.getElementById('n_in').value.trim().toLowerCase();
            const code = document.getElementById('code_in').value.trim();

            if (!email || !password) { alert('Заполните Email и Пароль!'); return; }
            document.getElementById('loading-screen').innerHTML = '🪙 Обработка...';

            // --- РЕЖИМ ВХОДА (По Email и Паролю) ---
            if (this.authMode === 'login') {
                const { data, error: authError } = await sb.auth.signInWithPassword({ email: email, password: password });
                
                if (authError) { 
                    alert('Ошибка входа: Неверный Email или Пароль!'); 
                    this.askLogin(); 
                    return; 
                }

                if (data?.user) {
                    localStorage.setItem('briff_user_id', data.user.id);
                    location.reload();
                }

            // --- РЕЖИМ РЕГИСТРАЦИИ ---
            } else {
                if (!nickname) { alert('Введите ваше Имя / Никнейм!'); this.askLogin(); return; }
                
                // 1. Создаем пользователя в системе авторизации Supabase
                const { data, error: authError } = await sb.auth.signUp({ email: email, password: password });
                if (authError) { alert('Ошибка создания аккаунта: ' + authError.message); this.askLogin(); return; }

                if (data?.user) {
                    let finalPairCode = code;

                    // Если код союза не введен — значит регистрируется первый партнер
                    if (!finalPairCode || finalPairCode.length !== 6) {
                        finalPairCode = String(Math.floor(100000 + Math.random() * 900000));
                        alert(`Пара успешно создана!\n\nВаш КОД СОЮЗА: ${finalPairCode}\n\nСкопируйте его из личного кабинета и отправьте партнеру. Ему нужно будет ввести его при своей регистрации.`);
                    } else {
                        // Если код введен, проверяем, существует ли пара первого участника
                        const { data: checkPair } = await sb.from('profiles').select('pair_code').eq('pair_code', finalPairCode).limit(1);
                        if (!checkPair || checkPair.length === 0) {
                            alert('Указанный код союза не найден. Для вас сгенерирован новый независимый код.');
                            finalPairCode = String(Math.floor(100000 + Math.random() * 900000));
                        } else {
                            alert('Вы успешно подключились к союзу партнера!');
                        }
                    }

                    // 2. Создаем карточку профиля с привязкой к системному id
                    const { error: profError } = await sb.from('profiles').insert([
                        { id: data.user.id, nickname: nickname, pair_code: finalPairCode, xp: 0, current_week: 1, used_dates: "" }
                    ]);

                    if (profError) { alert('Ошибка создания карточки профиля: ' + profError.message); this.askLogin(); return; }

                    localStorage.setItem('briff_user_id', data.user.id);
                    location.reload();
                }
            }
        },

        async start() {
            const { data: pr, error } = await sb.from('profiles').select('*').eq('id', this.user_id).maybeSingle();
            if (!pr || error) { this.logout(); return; }
            
            this.profile = pr;
            document.getElementById('pair-display').innerText = `КОД СОЮЗА: ${pr.pair_code}`;
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            this.renderTasks(); 
            await this.refresh();

            sb.channel('pair_channel')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles', filter: `pair_code=eq.${this.profile.pair_code}` }, async () => {
                    await this.refresh();
                })
                .subscribe();
        },

        renderTasks() { document.getElementById('tasks').innerHTML = this.tasks.map(t => `<div class="task-card"><div><b>${t.n}</b><br><span class="gold-num" style="font-size:1rem;">+${t.x}</span></div><div style="display:flex; gap:10px;"><button class="btn-action minus" onclick="app.doTask(${(t.x*-1)})">−</button><button class="btn-action plus" onclick="app.doTask(${t.x})">+</button></div></div>`).join(''); },

        async doTask(val) {
            const myXpEl = document.getElementById('v-my');
            const card = document.getElementById('main-card');
            
            myXpEl.classList.remove('bump');
            card.classList.remove('update-flash');
            void myXpEl.offsetWidth; 
            
            myXpEl.classList.add('bump');
            card.classList.add('update-flash');
            
            setTimeout(() => { myXpEl.classList.remove('bump'); card.classList.remove('update-flash'); }, 300);

            const { data: cur } = await sb.from('profiles').select('xp').eq('id', this.user_id).single();
            const newXp = Math.max(0, (cur.xp || 0) + val);
            await sb.from('profiles').update({ xp: newXp }).eq('id', this.user_id);
            this.profile.xp = newXp; this.refresh();
        },

        async refresh() {
            const { data: team } = await sb.from('profiles').select('*').eq('pair_code', this.profile.pair_code);
            if (!team) return;
            const me = team.find(x => x.id === this.user_id), p = team.find(x => x.id !== this.user_id);
            if (me) this.updateUI(me, p);
        },

        updateUI(me, p) {
            document.getElementById('v-my').innerHTML = `${me.xp} <div class="coin-icon"></div>`;
            document.getElementById('f-my').style.width = Math.min((me.xp/2000)*100, 100) + '%';
            if(p) {
                document.getElementById('label-p').innerText = p.nickname.toUpperCase();
                document.getElementById('label-p').style.color = '#888';
                document.getElementById('v-p').innerHTML = `${p.xp} <div class="coin-icon"></div>`;
                document.getElementById('f-p').style.width = Math.min((p.xp/2000)*100, 100) + '%';
            } else {
                document.getElementById('label-p').innerText = 'ОЖИДАНИЕ ПАРТНЕРА...';
                document.getElementById('label-p').style.color = '#FFD700';
                document.getElementById('v-p').innerHTML = `0 <div class="coin-icon"></div>`;
                document.getElementById('f-p').style.width = '0%';
            }
            
            document.getElementById('week-tag').innerText = `НЕДЕЛЯ ${me.current_week || 1} / 4`;
            const history = me.used_dates || "";
            document.getElementById('date-status').innerText = history.includes("|") ? `Свидание недели: ${history.split("|").pop().trim()}` : "";

            const now = new Date();
            const isFridayEvening = (now.getDay() === 5 && now.getHours() >= 18);
            const isLeader = p ? (me.xp > p.xp) : (me.xp > 0);
            const shopBtn = document.getElementById('shop-trigger-btn');
            
            if (isFridayEvening && isLeader && me.xp > 0) {
                shopBtn.disabled = false; shopBtn.classList.add('active');
            } else {
                shopBtn.disabled = true; shopBtn.classList.remove('active');
            }
        },

        copyPairCode() {
            const codeText = this.profile.pair_code;
            navigator.clipboard.writeText(codeText).then(() => {
                alert('Код союза скопирован!');
            }).catch(err => {
                alert('Ваш код: ' + codeText);
            });
        },

        openDateSelection() {
            const history = this.profile.used_dates || "";
            const shuffled = this.allDates.filter(d => !history.includes(d.n)).sort(() => 0.5 - Math.random()).slice(0, 3);
            document.getElementById('date-modal').style.display = 'block';
            document.getElementById('date-list').innerHTML = shuffled.map(d => `<div class="date-option" onclick="app.selectDate('${d.n}', ${d.p})"><span>${d.n}</span><span class="gold-num" style="font-size:1rem;">${d.p} <div class="coin-icon"></div></span></div>`).join('');
        },

        async selectDate(name, price) {
            if (this.profile.xp < price) { alert(`Недостаточно баллов!`); return; }
            if(!confirm(`Выбираем "${name}"?`)) return;
            const nextWeek = (this.profile.current_week || 1) + 1;
            const newHistory = (this.profile.used_dates || "") + " | " + name;
            
            await sb.from('profiles').update({ xp: 0, current_week: nextWeek, used_dates: newHistory }).eq('pair_code', this.profile.pair_code);
            location.reload();
        },
        logout() { localStorage.clear(); location.reload(); }
    };
    app.init();
</script>
