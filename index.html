<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briff Game</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/b-key.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; padding-bottom: 120px; }
        .container { width: 100%; max-width: 400px; }

        .gold { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); font-weight: bold; }
        
        #news-bar { display: none; background: linear-gradient(90deg, #FFD700, #FFA500); color: #000; padding: 12px; border-radius: 15px; margin-bottom: 20px; width: 100%; font-weight: bold; text-align: center; font-size: 0.9rem; }

        .stats-card { background: #1e1e1e; padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid #333; width: 100%; box-sizing: border-box; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .progress-bar { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; transition: 0.6s ease; }
        .my-bar { background: #00d4ff; }
        .p-bar { background: #ff007a; }

        .task-card { background: #1e1e1e; padding: 18px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid #2a2a2a; width: 100%; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; }
        .add-btn { background: #00d4ff; width: 50px; height: 50px; border-radius: 14px; font-size: 1.8rem; border: none; font-weight: bold; color: #121212; }
        .sub-btn { background: #2a2a2a; color: #666; width: 50px; height: 50px; border-radius: 14px; border: none; font-size: 1.8rem; }
        
        .logout-section { width: 100%; margin-top: 50px; text-align: center; }
        .btn-exit { background: none; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 12px 25px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }

        #date-market { display: none; background: #1e1e1e; padding: 25px; border-radius: 30px; border: 2px solid #FFD700; position: fixed; top: 10%; left: 5%; width: 90%; max-width: 360px; z-index: 1000; box-sizing: border-box; box-shadow: 0 0 100px #000; }
        .date-option { background: #2a2a2a; padding: 15px; border-radius: 15px; margin: 10px 0; border: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        .week-selector { display: inline-block; background: #1e1e1e; border: 1px solid #00d4ff; padding: 10px 15px; border-radius: 12px; color: #00d4ff; font-size: 0.7rem; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loading-screen" style="margin-top:100px; color:#FFD700;">🪙 Синхронизация...</div>

<div class="container" id="game-screen" style="display:none;">
    <div id="news-bar"></div>

    <div style="text-align: center; margin-bottom: 25px;">
        <h2 id="greet" style="margin:0;">Briff</h2>
        <div id="week-tag" class="week-selector" onclick="app.testWin()">НЕДЕЛЯ 1 / 4 (ТЕСТ ФИНАЛА)</div>
    </div>

    <div class="stats-card">
        <div style="display:flex; justify-content:space-between;"><span style="color:#888;">Я</span><span id="v-my" class="gold">0 🪙</span></div>
        <div class="progress-bar"><div id="f-my" class="progress-fill my-bar"></div></div>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px;"><span style="color:#888;">Партнер</span><span id="v-p" class="gold" style="color:#ff007a;">0 🪙</span></div>
        <div class="progress-bar"><div id="f-p" class="progress-fill p-bar"></div></div>
    </div>

    <div id="tasks"></div>

    <div class="logout-section">
        <button class="btn-exit" onclick="app.logout()">ВЫЙТИ ИЗ АККАУНТА</button>
    </div>

    <div id="date-market">
        <h3 style="text-align:center; color:#FFD700;">Выбери свидание!</h3>
        <div id="date-options"></div>
        <button onclick="document.getElementById('date-market').style.display='none'" style="width:100%; background:none; color:#666; border:none; margin-top:10px; padding:10px;">Закрыть</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bndqlyigisgbwqaujtys.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_LDcqX8mk4Mn6gFihWPZ6eg_DzW9xWlN';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = {
        user: null, profile: null,
        tasks: [{id:'pos', n:'Посуда', x:30},{id:'st', n:'Стирка', x:40},{id:'ub', n:'Уборка', x:100},{id:'sh', n:'Сушилка', x:20},{id:'zf', n:'Завтрак', x:60}],
        allDates: [{n:"Карш и мак", p:150}, {n:"Роллы и Кино", p:200}, {n:"Настолки с вином", p:250}, {n:"Поход в кино", p:300}, {n:"Поход в бар", p:350}, {n:"Квиз", p:400}, {n:"Музей/Выставка", p:450}, {n:"Катание на лодочках", p:500}, {n:"Пикник", p:550}, {n:"Гастро тур", p:600}, {n:"Поход в Театр", p:700}, {n:"Мастер класс", p:800}],

        async init() {
            const n = localStorage.getItem('briff_nick'), p = localStorage.getItem('briff_pass');
            if (!n || !p) return this.askLogin();
            const { data } = await sb.auth.signInWithPassword({ email: `${n.toLowerCase()}@gmail.com`, password: p });
            if (!data.user) return this.logout();
            this.user = data.user; await this.start();
        },

        askLogin() {
            document.getElementById('loading-screen').innerHTML = `
                <div style="background:#1e1e1e; padding:20px; border-radius:20px; border:1px solid #333; width:100%;">
                    <h3 style="color:#00d4ff">Вход</h3>
                    <input type="text" id="n_in" placeholder="Ник" style="width:100%; padding:15px; margin:10px 0; background:#2a2a2a; border:1px solid #444; color:white; border-radius:12px; box-sizing:border-box;">
                    <input type="password" id="p_in" placeholder="Пароль" style="width:100%; padding:15px; margin:10px 0; background:#2a2a2a; border:1px solid #444; color:white; border-radius:12px; box-sizing:border-box;">
                    <button onclick="app.saveLogin()" style="width:100%; background:#00d4ff; padding:15px; border:none; border-radius:12px; font-weight:bold;">ВОЙТИ</button>
                </div>`;
        },

        saveLogin() {
            const n = document.getElementById('n_in').value.trim(), p = document.getElementById('p_in').value;
            if(n && p) { localStorage.setItem('briff_nick', n); localStorage.setItem('briff_pass', p); location.reload(); }
        },

        async start() {
            const { data: pr } = await sb.from('profiles').select('*').eq('id', this.user.id).single();
            this.profile = pr;
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('greet').innerText = `Кошелёк: ${pr.nickname}`;
            this.renderTasks(); this.refresh();
            sb.channel('db').on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles'},()=>this.refresh()).subscribe();
        },

        renderTasks() {
            document.getElementById('tasks').innerHTML = this.tasks.map(t => `
                <div class="task-card">
                    <div><b>${t.n}</b><br><span class="gold">+${t.x} 🪙</span></div>
                    <div class="controls">
                        <button class="sub-btn" onclick="app.doTask(${(t.x * -1)})">−</button>
                        <button class="add-btn" onclick="app.doTask(${t.x})">+</button>
                    </div>
                </div>`).join('');
        },

        async doTask(x) {
            const { data } = await sb.from('profiles').select('xp').eq('id', this.user.id).single();
            const newXP = Math.max(0, (data.xp || 0) + x);
            await sb.from('profiles').update({ xp: newXP }).eq('id', this.user.id);
            this.refresh(); // Мгновенное обновление
        },

        async refresh() {
            const { data: team } = await sb.from('profiles').select('*').eq('pair_code', this.profile.pair_code);
            const me = team.find(x => x.id === this.user.id), p = team.find(x => x.id !== this.user.id);
            document.getElementById('v-my').innerText = `${me.xp} 🪙`;
            document.getElementById('f-my').style.width = Math.min((me.xp/800)*100, 100)
