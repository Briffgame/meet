<script>
    const SUPABASE_URL = 'https://bndqlyigisgbwqaujtys.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_LDcqX8mk4Mn6gFihWPZ6eg_DzW9xWlN';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = {
        user_id: null, profile: null, authMode: 'login',
        wizardTasks: [], selectedValue: 30, inlineSelectedValue: 30,
        tasks: [], isEditMode: false,
        allDates: [{n:"🍦 Прогулка", p:150}, {n:"🍿 Кино", p:300}, {n:"🧩 Сборка пазла", p:200}, {n:"🧘 Совместная йога", p:250}, {n:"🍝 Ресторан", p:600}, {n:"🍷 Вино и Домино", p:400}, {n:"🎮 Турнир в приставку", p:350}, {n:"🎨 Рисование вином", p:500}, {n:"🎤 Караоке", p:450}, {n:"🛀 СПА дома", p:700}, {n:"🎭 Театр или Стендап", p:900}, {n:"⛸️ Каток или Ролики", p:400}, {n:"🍕 Мастер-класс", p:750}, {n:"📸 Фотосессия", p:1000}, {n:"🚗 Мини-трип", p:2000}, {n:"⛺ Пикник", p:800}, {n:"🏰 Музей/Выставка", p:550}, {n:"🍳 Завтрак в постель", p:1200}, {n:"🎱 Бильярд", p:400}, {n:"🤫 Секретное свидание", p:2500}],

        async init() {
            const savedId = localStorage.getItem('briff_user_id');
            if (!savedId) return this.askLogin();
            
            this.user_id = savedId;
            await this.start();
        },

        askLogin() {
            this.authMode = 'login';
            document.getElementById('loading-screen').innerHTML = `
                <div style="width: 100%; max-width: 300px; text-align: center; margin: 0 auto;">
                    <h2 id="auth-title" style="margin-bottom: 20px; color: #FFD700;">ВХОД В ПРИЛОЖЕНИЕ</h2>
                    <input type="email" id="e_in" placeholder="Ваш Email" style="width:100%; padding:18px; margin-bottom:12px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:18px; outline:none;">
                    <input type="password" id="p_in" placeholder="Пароль" style="width:100%; padding:18px; margin-bottom:12px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:18px; outline:none;">
                    <input type="text" id="n_in" placeholder="Ваше Имя / Никнейм" style="width:100%; padding:18px; margin-bottom:12px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:18px; outline:none; display:none;">
                    <input type="text" id="code_in" placeholder="6-значный код партнера" inputmode="numeric" pattern="[0-9]*" maxlength="6" style="width:100%; padding:18px; margin-bottom:20px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:18px; outline:none; display:none;">
                    <button id="auth-btn" onclick="app.handleAuth()" style="width:100%; padding:18px; background:linear-gradient(135deg, #00d4ff, #008fb3); border:none; color:#121212; font-weight:bold; border-radius:18px; font-size:1rem; cursor:pointer; margin-bottom: 15px;">ВОЙТИ</button>
                    <div id="auth-toggle" style="color: #666; cursor: pointer; font-size: 0.9rem; text-decoration: underline;" onclick="app.toggleAuthMode()">У вас нет аккаунта? Зарегистрироваться</div>
                </div>
            `;
        },

        toggleAuthMode() {
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-btn');
            const toggle = document.getElementById('auth-toggle');
            const nicknameInput = document.getElementById('n_in');
            const codeInput = document.getElementById('code_in');

            if (this.authMode === 'login') {
                this.authMode = 'register';
                title.innerText = 'РЕГИСТРАЦИЯ ПАРЫ';
                btn.innerText = 'СОЗДАТЬ АККАУНТ';
                toggle.innerText = 'Уже есть аккаунт? Войти по Email';
                nicknameInput.style.display = 'block';
                codeInput.style.display = 'block';
            } else {
                this.authMode = 'login';
                title.innerText = 'ВХОД В ПРИЛОЖЕНИЕ';
                btn.innerText = 'ВОЙТИ';
                toggle.innerText = 'У вас нет аккаунта? Зарегистрироваться';
                nicknameInput.style.display = 'none';
                codeInput.style.display = 'none';
            }
        },

        async handleAuth() {
            const email = document.getElementById('e_in').value.trim().toLowerCase();
            const password = document.getElementById('p_in').value;
            const nickname = document.getElementById('n_in').value.trim().toLowerCase();
            const code = document.getElementById('code_in').value.trim();

            if (!email || !password) { alert('Заполните Email и Пароль!'); return; }
            document.getElementById('loading-screen').innerHTML = '🪙 Обработка...';

            if (this.authMode === 'login') {
                const { data, error: authError } = await sb.auth.signInWithPassword({ email: email, password: password });
                if (authError) { alert('Ошибка входа от сервера: ' + authError.message); this.askLogin(); return; }
                if (data?.user) { localStorage.setItem('briff_user_id', data.user.id); location.reload(); }
            } else {
                if (!nickname) { alert('Введите ваше Имя / Никнейм!'); this.askLogin(); return; }
                const { data, error: authError } = await sb.auth.signUp({ email: email, password: password });
                if (authError) { alert('Ошибка создания аккаунта: ' + authError.message); this.askLogin(); return; }

                if (data?.user) {
                    let finalPairCode = code;
                    if (!finalPairCode || finalPairCode.length !== 6) {
                        finalPairCode = String(Math.floor(100000 + Math.random() * 900000));
                        alert(`Пара успешно создана!\n\nВаш КОД СОЮЗА: ${finalPairCode}`);
                    } else {
                        const { data: checkPair } = await sb.from('profiles').select('pair_code').eq('pair_code', finalPairCode).limit(1);
                        if (!checkPair || checkPair.length === 0) {
                            finalPairCode = String(Math.floor(100000 + Math.random() * 900000));
                        }
                    }
                    await sb.from('profiles').insert([{ id: data.user.id, nickname: nickname, pair_code: finalPairCode, xp: 0, current_week: 1, used_dates: "" }]);
                    localStorage.setItem('briff_user_id', data.user.id);
                    location.reload();
                }
            }
        },

        async start() {
            const { data: pr, error } = await sb.from('profiles').select('*').eq('id', this.user_id).maybeSingle();
            if (!pr || error) { this.logout(); return; }
            
            this.profile = pr;
            document.getElementById('pair-display').innerText = `КОД СОЮЗА: ${pr.pair_code}`;
            
            await this.loadTasksFromDB();
            
            document.getElementById('loading-screen').style.display = 'none';

            if (this.tasks.length === 0) {
                document.getElementById('wizard-screen').style.display = 'block';
                this.renderWizardTasks();
            } else {
                document.getElementById('game-screen').style.display = 'block';
                this.renderTasks(); 
                await this.refresh();
            }

            // Живая подписка на изменения профилей
            sb.channel('pair_channel')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles', filter: `pair_code=eq.${this.profile.pair_code}` }, async () => {
                    await this.refresh();
                })
                .subscribe();

            // Живая подписка на добавление/удаление задач другими устройствами
            sb.channel('tasks_channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks', filter: `pair_code=eq.${this.profile.pair_code}` }, async () => {
                    await this.loadTasksFromDB();
                    this.renderTasks();
                })
                .subscribe();
        },

        async loadTasksFromDB() {
            const { data: dbTasks } = await sb.from('tasks').select('*').eq('pair_code', this.profile.pair_code);
            if (dbTasks) {
                this.tasks = dbTasks.map(t => ({ id: t.id, n: t.text, x: t.difficulty }));
            } else {
                this.tasks = [];
            }
        },

        selectChip(val, el) {
            document.querySelectorAll('.chip:not(.inline-chip)').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            this.selectedValue = val;
        },

        addWizardTask() {
            const input = document.getElementById('task-name-input');
            const name = input.value.trim();
            if (!name) { alert('Введите название задачи!'); return; }
            
            this.wizardTasks.push({ text: name, difficulty: this.selectedValue });
            input.value = '';
            this.renderWizardTasks();
        },

        renderWizardTasks() {
            const container = document.getElementById('wizard-tasks-list');
            if (this.wizardTasks.length === 0) {
                container.innerHTML = `<div style="color:#666; font-style:italic; text-align:center; padding:10px;">Список пока пуст...</div>`;
                return;
            }
            container.innerHTML = this.wizardTasks.map((t, index) => `
                <div class="wizard-item">
                    <span>${t.text}</span>
                    <span style="color:#FFD700; font-weight:bold;">+${t.difficulty} 🪙</span>
                </div>
            `).join('');
        },

        async saveWizardTasks() {
            if (this.wizardTasks.length === 0) {
                alert('Добавьте хотя бы одну задачу перед продолжением!');
                return;
            }
            document.getElementById('wizard-screen').innerHTML = `<div style="text-align:center; padding:40px;">🪙 Сохраняем задачи в базу союза...</div>`;

            const rowsToInsert = this.wizardTasks.map(t => ({
                pair_code: this.profile.pair_code,
                text: t.text,
                difficulty: t.difficulty
            }));

            const { error } = await sb.from('tasks').insert(rowsToInsert);
            if (error) { alert('Ошибка при сохранении: ' + error.message); location.reload(); } 
            else { alert('Задачи союза успешно сохранены!'); location.reload(); }
        },

        toggleEditMode() {
            this.isEditMode = !this.isEditMode;
            const btn = document.getElementById('edit-mode-btn');
            const form = document.getElementById('inline-task-form');
            
            if (this.isEditMode) {
                btn.innerText = '✓ Выйти из настройки';
                btn.classList.add('active');
                form.style.display = 'block';
            } else {
                btn.innerText = '⚙️ Настройка задач';
                btn.classList.remove('active');
                form.style.display = 'none';
            }
            this.renderTasks();
        },

        selectInlineChip(val, el) {
            document.querySelectorAll('.inline-chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            this.inlineSelectedValue = val;
        },

        async addInlineTask() {
            const input = document.getElementById('inline-task-input');
            const name = input.value.trim();
            if (!name) { alert('Введите название новой задачи!'); return; }

            const { error } = await sb.from('tasks').insert([{
                pair_code: this.profile.pair_code,
                text: name,
                difficulty: this.inlineSelectedValue
            }]);

            if (error) {
                alert('Не удалось добавить задачу: ' + error.message);
            } else {
                input.value = '';
                // Принудительно перечитываем локально для мгновенной перерисовки
                await this.loadTasksFromDB();
                this.renderTasks();
            }
        },

        async deleteInlineTask(dbId) {
            if (!confirm('Вы действительно хотите полностью удалить эту задачу?')) return;

            const { error } = await sb.from('tasks').delete().eq('id', dbId);
            if (error) {
                alert('Не удалось удалить задачу: ' + error.message);
            } else {
                // Принудительно перечитываем локально для мгновенной перерисовки
                await this.loadTasksFromDB();
                this.renderTasks();
            }
        },

        renderTasks() { 
            const container = document.getElementById('tasks');
            if (this.tasks.length === 0) {
                container.innerHTML = `<div style="color:#666; text-align:center; padding:30px; font-style:italic;">Задач пока нет. Нажмите настройки, чтобы добавить.</div>`;
                return;
            }

            container.innerHTML = this.tasks.map((t, index) => {
                if (this.isEditMode) {
                    // Передаем t.id как строку в кавычках и вешаем вызов прямо на обычный click/onclick
                    return `
                        <div class="task-card" style="border-color: #444;">
                            <div><b>${t.n}</b><br><span class="gold-num" style="font-size:1rem;">+${t.x}</span></div>
                            <button class="delete-btn" onclick="app.deleteInlineTask('${t.id}')">🗑️</button>
                        </div>
                    `;
                } else {
                    return `
                        <div class="task-card">
                            <div><b>${t.n}</b><br><span class="gold-num" style="font-size:1rem;">+${t.x}</span></div>
                            <div style="display:flex; gap:10px;">
                                <button class="btn-action minus" id="btn-minus-${index}">−</button>
                                <button class="btn-action plus" id="btn-plus-${index}">+</button>
                            </div>
                        </div>
                    `;
                }
            }).join(''); 

            // Навешиваем touch-события ИСКЛЮЧИТЕЛЬНО на игровые кнопки + и -, чтобы они не блокировали остальной UI
            if (!this.isEditMode) {
                this.tasks.forEach((t, index) => {
                    const btnMinus = document.getElementById(`btn-minus-${index}`);
                    const btnPlus = document.getElementById(`btn-plus-${index}`);
                    if (!btnMinus || !btnPlus) return;

                    const handleTouch = (val, e) => {
                        e.preventDefault(); e.stopPropagation();
                        app.doTask(val);
                    };

                    btnMinus.addEventListener('touchstart', (e) => handleTouch(t.x * -1, e), { passive: false });
                    btnPlus.addEventListener('touchstart', (e) => handleTouch(t.x, e), { passive: false });
                    
                    btnMinus.addEventListener('click', (e) => { e.preventDefault(); app.doTask(t.x * -1); });
                    btnPlus.addEventListener('click', (e) => { e.preventDefault(); app.doTask(t.x); });
                });
            }
        },

        async doTask(val) {
            const myXpEl = document.getElementById('v-my');
            const card = document.getElementById('main-card');
            
            myXpEl.classList.remove('bump'); card.classList.remove('update-flash');
            void myXpEl.offsetWidth; 
            myXpEl.classList.add('bump'); card.classList.add('update-flash');
            
            setTimeout(() => { myXpEl.classList.remove('bump'); card.classList.remove('update-flash'); }, 300);

            const { data: cur } = await sb.from('profiles').select('xp').eq('id', this.user_id).single();
            const newXp = Math.max(0, (cur.xp || 0) + val);
            await sb.from('profiles').update({ xp: newXp }).eq('id', this.user_id);
            this.profile.xp = newXp; 
            this.refresh();
        },

        async refresh() {
            const { data: team } = await sb.from('profiles').select('*').eq('pair_code', this.profile.pair_code);
            if (!team) return;
            const me = team.find(x => x.id === this.user_id), p = team.find(x => x.id !== this.user_id);
            if (me) this.updateUI(me, p);
        },

        updateUI(me, p) {
            document.getElementById('v-my').innerHTML = `${me.xp} <div class="coin-icon"></div>`;
            document.getElementById('f-my').style.width = Math.min((me.xp/2000)*100, 100) + '%';
            if(p) {
                document.getElementById('label-p').innerText = p.nickname.toUpperCase();
                document.getElementById('v-p').innerHTML = `${p.xp} <div class="coin-icon"></div>`;
                document.getElementById('f-p').style.width = Math.min((p.xp/2000)*100, 100) + '%';
            } else {
                document.getElementById('label-p').innerText = 'ОЖИДАНИЕ ПАРТНЕРА...';
                document.getElementById('v-p').innerHTML = `0 <div class="coin-icon"></div>`;
                document.getElementById('f-p').style.width = '0%';
            }
            
            document.getElementById('week-tag').innerText = `НЕДЕЛЯ ${me.current_week || 1} / 4`;
            const history = me.used_dates || "";
            document.getElementById('date-status').innerText = history.includes("|") ? `Свидание недели: ${history.split("|").pop().trim()}` : "";

            const now = new Date();
            const isFridayEvening = (now.getDay() === 5 && now.getHours() >= 18);
            const isLeader = p ? (me.xp > p.xp) : (me.xp > 0);
            const shopBtn = document.getElementById('shop-trigger-btn');
            
            if (isFridayEvening && isLeader && me.xp > 0) {
                shopBtn.disabled = false; shopBtn.classList.add('active');
            } else {
                shopBtn.disabled = true; shopBtn.classList.remove('active');
            }
        },

        copyPairCode() {
            const codeText = this.profile.pair_code;
            navigator.clipboard.writeText(codeText).then(() => { alert('Код союза скопирован!'); }).catch(err => { alert('Ваш код: ' + codeText); });
        },

        openDateSelection() {
            const history = this.profile.used_dates || "";
            const shuffled = this.allDates.filter(d => !history.includes(d.n)).sort(() => 0.5 - Math.random()).slice(0, 3);
            document.getElementById('date-modal').style.display = 'block';
            document.getElementById('date-list').innerHTML = shuffled.map(d => `<div class="date-option" onclick="app.selectDate('${d.n}', ${d.p})"><span>${d.n}</span><span class="gold-num" style="font-size:1rem;">${d.p} <div class="coin-icon"></div></span></div>`).join('');
        },

        async selectDate(name, price) {
            if (this.profile.xp < price) { alert(`Недостаточно баллов!`); return; }
            if(!confirm(`Выбираем "${name}"?`)) return;
            const nextWeek = (this.profile.current_week || 1) + 1;
            const newHistory = (this.profile.used_dates || "") + " | " + name;
            
            await sb.from('profiles').update({ xp: 0, current_week: nextWeek, used_dates: newHistory }).eq('pair_code', this.profile.pair_code);
            location.reload();
        },
        logout() { localStorage.clear(); location.reload(); }
    };
    app.init();
</script>
