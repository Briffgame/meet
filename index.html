<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briff Game</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/b-key.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 400px; }
        .auth-card { background: #1e1e1e; padding: 30px; border-radius: 25px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 16px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; border-radius: 12px; color: white; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .primary { background: #00d4ff; color: #121212; }
        .task-card { background: #1e1e1e; padding: 15px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid #2a2a2a; }
        .controls { display: flex; gap: 8px; }
        .add-btn { background: #00d4ff; width: 45px; height: 45px; border-radius: 12px; font-size: 1.5rem; border: none; color: #121212; font-weight: bold; }
        .sub-btn { background: #333; color: #666; width: 45px; height: 45px; border-radius: 12px; border: none; font-size: 1.5rem; }
        #loading-screen { margin-top: 100px; text-align: center; color: #00d4ff; }
        #game-screen, #auth-screen { display: none; }
        .error-msg { color: #ff4d4d; font-size: 0.8rem; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="loading-screen">Загрузка системы...<div id="debug" style="font-size:10px; color:#444; margin-top:10px;"></div></div>

<div class="container" id="auth-screen">
    <h1 style="color: #00d4ff; text-align: center;">Briff Game</h1>
    <div class="auth-card">
        <input type="text" id="nick" placeholder="Твой Ник">
        <input type="password" id="pair-pass" placeholder="Пароль пары">
        <button class="btn primary" onclick="app.handleLogin()">Войти</button>
        <p style="font-size: 0.7rem; color: #666; margin-top: 15px;">Если нет аккаунта, создайте его в браузере</p>
    </div>
</div>

<div class="container" id="game-screen">
    <h2 id="greet" style="text-align: center;">Привет!</h2>
    <div id="tasks"></div>
    <button onclick="app.logout()" style="background:none; border:none; color:#444; width:100%; margin-top:20px; text-decoration: underline;">Выйти</button>
</div>

<script>
    const SUPABASE_URL = 'https://bndqlyigisgbwqaujtys.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_LDcqX8mk4Mn6gFihWPZ6eg_DzW9xWlN';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = {
        user: null,
        tasks: [{id:'pos', n:'Посуда', x:30},{id:'st', n:'Стирка', x:40},{id:'ub', n:'Уборка', x:100},{id:'sh', n:'Сушилка', x:20},{id:'zf', n:'Завтрак', x:60}],

        async init() {
            const n = localStorage.getItem('briff_nick');
            const p = localStorage.getItem('briff_pass');
            
            if (n && p) {
                try {
                    const { data, error } = await sb.auth.signInWithPassword({ 
                        email: `${n.toLowerCase()}@gmail.com`, 
                        password: p 
                    });
                    if (error) throw error;
                    this.user = data.user;
                    this.showGame();
                } catch (e) {
                    console.error(e);
                    this.showAuth();
                }
            } else {
                this.showAuth();
            }
        },

        showAuth() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'block';
        },

        async handleLogin() {
            const n = document.getElementById('nick').value.trim();
            const p = document.getElementById('pair-pass').value;
            if(!n || !p) return alert("Введи данные!");

            const { data, error } = await sb.auth.signInWithPassword({ 
                email: `${n.toLowerCase()}@gmail.com`, 
                password: p 
            });

            if (error) return alert("Ошибка: " + error.message);
            
            localStorage.setItem('briff_nick', n);
            localStorage.setItem('briff_pass', p);
            this.user = data.user;
            this.showGame();
        },

        async showGame() {
            const { data: pr } = await sb.from('profiles').select('nickname').eq('id', this.user.id).single();
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('greet').innerText = `Кошелёк: ${pr.nickname}`;
            this.renderTasks();
        },

        renderTasks() {
            document.getElementById('tasks').innerHTML = this.tasks.map(t => `
                <div class="task-card">
                    <div><b>${t.n}</b><br><small>+${t.x} 🪙</small></div>
                    <div class="controls">
                        <button class="sub-btn" onclick="app.doTask(${t.x*-1})">−</button>
                        <button class="add-btn" onclick="app.doTask(${t.x})">+</button>
                    </div>
                </div>`).join('');
        },

        async doTask(x) {
            try {
                const { data } = await sb.from('profiles').select('xp').eq('id', this.user.id).single();
                const { error } = await sb.from('profiles').update({ xp: Math.max(0, data.xp + x) }).eq('id', this.user.id);
                if (error) alert("Ошибка базы: " + error.message);
                else {
                    // Визуальный отклик для iPhone (легкая вибрация если поддерживается)
                    if (window.navigator.vibrate) window.navigator.vibrate(10);
                }
            } catch (e) {
                alert("Ошибка соединения");
            }
        },

        logout() {
            localStorage.clear();
            location.reload();
        }
    };

    app.init();
</script>
</body>
</html>
