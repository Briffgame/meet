<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briff Game</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/b-key.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 400px; }

        /* ЗОЛОТОЙ СТИЛЬ */
        .gold { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); font-weight: bold; }
        
        #news-bar { display: none; background: linear-gradient(90deg, #FFD700, #FFA500); color: #000; padding: 12px; border-radius: 15px; margin-bottom: 20px; width: 100%; font-weight: bold; text-align: center; font-size: 0.9rem; box-shadow: 0 5px 15px rgba(255,215,0,0.4); }

        .stats-card { background: #1e1e1e; padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid #333; position: relative; width: 100%; box-sizing: border-box; }
        .progress-bar { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; transition: 0.8s ease; }
        .my-bar { background: #00d4ff; }
        .p-bar { background: #ff007a; }

        .task-card { background: #1e1e1e; padding: 18px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid #2a2a2a; width: 100%; box-sizing: border-box; }
        .add-btn { background: #00d4ff; width: 55px; height: 55px; border-radius: 16px; font-size: 2rem; border: none; font-weight: bold; color: #121212; }
        
        #date-market { display: none; background: #1e1e1e; padding: 25px; border-radius: 30px; border: 2px solid #FFD700; position: fixed; top: 10%; left: 5%; width: 90%; max-width: 360px; z-index: 1000; box-sizing: border-box; box-shadow: 0 0 100px #000; }
        .date-option { background: #2a2a2a; padding: 15px; border-radius: 15px; margin: 10px 0; border: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }

        .logout-btn { background: none; border: none; color: #444; text-decoration: underline; font-size: 0.8rem; margin-top: 40px; cursor: pointer; padding: 10px; width: 100%; }
        .week-selector { display: inline-block; background: #1e1e1e; border: 1px solid #00d4ff; padding: 10px 15px; border-radius: 12px; color: #00d4ff; font-size: 0.7rem; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loading-screen" style="margin-top:100px; color:#FFD700;">🪙 Загрузка...</div>

<div class="container" id="game-screen" style="display:none;">
    <div id="news-bar"></div>

    <div style="text-align: center; margin-bottom: 25px;">
        <h2 id="greet" style="margin:0;">Briff</h2>
        <div id="week-tag" class="week-selector" onclick="app.testWin()">
            НЕДЕЛЯ 1 / 4 (ТЕСТ ФИНАЛА)
        </div>
    </div>

    <div class="stats-card">
        <div style="display:flex; justify-content:space-between;"><span style="color:#888;">Я</span><span id="v-my" class="gold">0 🪙</span></div>
        <div class="progress-bar"><div id="f-my" class="progress-fill my-bar"></div></div>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px;"><span style="color:#888;">Партнер</span><span id="v-p" class="gold" style="color:#ff007a;">0 🪙</span></div>
        <div class="progress-bar"><div id="f-p" class="progress-fill p-bar"></div></div>
    </div>

    <div id="tasks"></div>

    <button class="logout-btn" onclick="app.logout()">ВЫЙТИ ИЗ АККАУНТА</button>

    <div id="date-market">
        <h3 style="text-align:center; color:#FFD700;">Выбери свидание!</h3>
        <div id="date-options"></div>
        <button onclick="document.getElementById('date-market').style.display='none'" style="width:100%; background:none; color:#666; border:none; margin-top:10px;">Закрыть</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bndqlyigisgbwqaujtys.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_LDcqX8mk4Mn6gFihWPZ6eg_DzW9xWlN';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const app = {
        user: null, profile: null,
        tasks: [{id:'pos', n:'Посуда', x:30},{id:'st', n:'Стирка', x:40},{id:'ub', n:'Уборка', x:100},{id:'sh', n:'Сушилка', x:20},{id:'zf', n:'Завтрак', x:60}],
        allDates: [
            {n:"Карш и мак", p:150}, {n:"Роллы и Кино", p:200}, {n:"Настолки с вином", p:250},
            {n:"Поход в кино", p:300}, {n:"Поход в бар", p:350}, {n:"Квиз", p:400},
            {n:"Музей/Выставка", p:450}, {n:"Катание на лодочках", p:500}, {n:"Пикник", p:550},
            {n:"Гастро тур", p:600}, {n:"Поход в Театр", p:700}, {n:"Мастер класс", p:800}
        ],

        async init() {
            const n = localStorage.getItem('briff_nick'), p = localStorage.getItem('briff_pass');
            if (!n || !p) { this.showLogin(); return; }
            
            const { data, error } = await sb.auth.signInWithPassword({ email: `${n.toLowerCase()}@gmail.com`, password: p });
            if (error) { this.logout(); return; }
            this.user = data.user; await this.start();
        },

        showLogin() {
            document.getElementById('loading-screen').style.display = 'none';
            // Если нет логина, просто редирект на твою страницу входа или просим ввести данные
            const n = prompt("Введи свой ник:");
            const p = prompt("Введи пароль пары:");
            if(n && p) {
                localStorage.setItem('briff_nick', n);
                localStorage.setItem('briff_pass', p);
                location.reload();
            }
        },

        async start() {
            const { data: pr } = await sb.from('profiles').select('*').eq('id', this.user.id).single();
            this.profile = pr;
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            this.renderTasks(); this.refresh();
            sb.channel('db').on('postgres_changes',{event:'UPDATE',schema:'public',table:'profiles'},()=>this.refresh()).subscribe();
        },

        renderTasks() {
            document.getElementById('tasks').innerHTML = this.tasks.map(t => `
                <div class="task-card">
                    <div><b>${t.n}</b><br><span class="gold">+${t.x} 🪙</span></div>
                    <button class="add-btn" onclick="app.doTask(${t.x})">+</button>
                </div>`).join('');
        },

        async doTask(x) {
            const { data } = await sb.from('profiles').select('xp').eq('id', this.user.id).single();
            await sb.from('profiles').update({ xp: (data.xp || 0) + x }).eq('id', this.user.id);
            this.refresh();
        },

        async refresh() {
            const { data: team } = await sb.from('profiles').select('*').eq('pair_code', this.profile.pair_code);
            const me = team.find(x => x.id === this.user.id), p = team.find(x => x.id !== this.user.id);
            
            document.getElementById('v-my').innerText = `${me.xp} 🪙`;
            document.getElementById('f-my').style.width = Math.min((me.xp/800)*100, 100) + '%';
            
            if(p) {
                document.getElementById('v-p').innerText = `${p.xp} 🪙`;
                document.getElementById('f-p').style.width = Math.min((p.xp/800)*100, 100) + '%';
                
                const lastDate = (p.used_dates || "").split(',').pop();
                if (lastDate && !me.used_dates?.includes(lastDate)) {
                    const news = document.getElementById('news-bar');
                    news.style.display = 'block';
                    news.innerText = `${p.nickname} выбрал(а): ${lastDate}! ✨`;
                }
            }
        },

        testWin() {
            const me = this.profile;
            const allUsed = this.team?.map(u => u.used_dates || "").join(',').split(',').filter(x => x) || [];
            let available = this.allDates.filter
